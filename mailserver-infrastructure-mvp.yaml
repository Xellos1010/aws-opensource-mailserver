AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  DomainName:
    Type: String
    Default: emcnotary.com
    Description: The domain name for the mail server resources
    AllowedPattern: ^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$
    ConstraintDescription: Must be a valid domain name (e.g., emcnotary.com)

Resources:
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: MAILSERVER
          Value: !Ref DomainName

  NewKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub ${DomainName}-keypair
      Tags:
        - Key: MAILSERVER
          Value: !Ref DomainName

  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${DomainName}-backup
      Tags:
        - Key: MAILSERVER
          Value: !Ref DomainName

  NextcloudBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${DomainName}-nextcloud
      Tags:
        - Key: MAILSERVER
          Value: !Ref DomainName

Outputs:
  ElasticIPAddress:
    Description: The allocated Elastic IP address
    Value: !Ref ElasticIP
  KeyPairId:
    Description: The ID of the EC2 Key Pair
    Value: !Ref NewKeyPair