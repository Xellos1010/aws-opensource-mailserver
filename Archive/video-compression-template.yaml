AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM template for EC2 and S3 to process video with FFmpeg, including script generation

Resources:
  VideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "videoprocessingbucket${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter30Days
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: HEPE
          Value: Tools

  VideoProcessingInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M  # 15 minutes timeout for UserData
        Count: 1
    Properties:
      InstanceType: c5.4xlarge
      ImageId: ami-0f561d16f3799be82
      KeyName: !Ref SSHKeyPair
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: VideoProcessingEC2
        - Key: HEPE
          Value: Tools
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -x  # Enable debug output
          LOG_FILE="/home/ec2-user/setup.log"
          echo "Starting UserData execution at $(date)" > "$LOG_FILE" 2>&1
          
          # Install cfn-signal for signaling completion
          sudo yum install -y python3-pip >> "$LOG_FILE" 2>&1
          if [ $? -ne 0 ]; then
            echo "Error: Failed to install python3-pip at $(date)" >> "$LOG_FILE"
            exit 1
          fi
          pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz >> "$LOG_FILE" 2>&1
          if [ $? -ne 0 ]; then
            echo "Error: Failed to install aws-cfn-bootstrap at $(date)" >> "$LOG_FILE"
            exit 1
          fi
          
          # Update system and install basic dependencies
          sudo yum update -y >> "$LOG_FILE" 2>&1
          if [ $? -ne 0 ]; then
            echo "Error: yum update failed at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          sudo yum install -y awscli bc curl tar xz >> "$LOG_FILE" 2>&1
          if [ $? -ne 0 ]; then
            echo "Error: Failed to install awscli, bc, curl, tar, or xz at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          echo "System updated and basic dependencies installed at $(date)" >> "$LOG_FILE"

          # Install FFmpeg from static build
          echo "Installing FFmpeg from static build at $(date)..." >> "$LOG_FILE"
          curl -L -o /tmp/ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz >> "$LOG_FILE" 2>&1
          if [ $? -ne 0 ]; then
            echo "Error: Failed to download FFmpeg at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          tar -xJf /tmp/ffmpeg.tar.xz -C /tmp >> "$LOG_FILE" 2>&1
          if [ $? -ne 0 ]; then
            echo "Error: Failed to extract FFmpeg at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          sudo mv /tmp/ffmpeg-*-static/ffmpeg /usr/local/bin/ffmpeg >> "$LOG_FILE" 2>&1
          sudo mv /tmp/ffmpeg-*-static/ffprobe /usr/local/bin/ffprobe >> "$LOG_FILE" 2>&1
          if [ $? -ne 0 ]; then
            echo "Error: Failed to move FFmpeg binaries at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          rm -rf /tmp/ffmpeg* >> "$LOG_FILE" 2>&1
          if ! command -v ffprobe >/dev/null 2>&1; then
            echo "Error: ffprobe not installed after FFmpeg installation at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          echo "FFmpeg and ffprobe installed successfully at $(date)" >> "$LOG_FILE"

          # Create compression script with new bitrate logic
          echo "Creating compress_video.sh at $(date)..." >> "$LOG_FILE"
          cat << 'EOF' > /home/ec2-user/compress_video.sh
          #!/bin/bash
          INPUT_FILE="/tmp/input.mp4"
          OUTPUT_VIDEO="/tmp/output.mp4"
          AUDIO_BITRATE_KB=128
          TARGET_SIZE_MB=$1
          S3_INPUT="$2"
          S3_OUTPUT="$3"
          aws s3 cp "$S3_INPUT" "$INPUT_FILE"
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INPUT_FILE")
          TOTAL_DURATION_IN_SEC=$(printf "%.0f" "$DURATION")
          TARGET_SIZE_BITS=$(echo "$TARGET_SIZE_MB * 8000000" | bc)
          VIDEO_BITRATE=$(echo "($TARGET_SIZE_BITS - ($AUDIO_BITRATE_KB * 1000 * $TOTAL_DURATION_IN_SEC)) / $TOTAL_DURATION_IN_SEC / 1000" | bc)
          if [ -z "$VIDEO_BITRATE" ] || [ "$VIDEO_BITRATE" -le 0 ]; then
              echo "Error: Video bitrate calculation failed or too low."
              exit 1
          fi
          show_progress() {
              local pass=$1
              while read -r line; do
                  if echo "$line" | grep -q "^frame=[0-9]"; then
                      frame=$(echo "$line" | sed 's/frame=\([0-9]*\).*/\1/')
                  elif echo "$line" | grep -q "^out_time_ms=[0-9]"; then
                      out_time_ms=$(echo "$line" | sed 's/out_time_ms=\([0-9]*\).*/\1/')
                      out_time_sec=$((out_time_ms / 1000000))
                      percent=$(echo "scale=2; $out_time_sec / $TOTAL_DURATION_IN_SEC * 100" | bc)
                      echo -ne "Pass $pass Progress: $percent% (Frame: $frame, Time: $out_time_sec/$TOTAL_DURATION_IN_SEC sec)\r"
                  fi
              done
              echo ""  # Newline after progress completes
          }
          echo "Starting compression (Pass 1 of 2)..."
          ffmpeg -y -i "$INPUT_FILE" -c:v libx264 -b:v "$VIDEO_BITRATE"k -pass 1 -an -f mp4 /dev/null -progress pipe:1 2>/dev/null | show_progress 1
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "Error during first pass."
              exit 1
          fi
          echo "Pass 1 complete."

          echo "Starting compression (Pass 2 of 2)..."
          ffmpeg -y -i "$INPUT_FILE" -c:v libx264 -b:v "$VIDEO_BITRATE"k -pass 2 -c:a aac -b:a "$AUDIO_BITRATE_KB"k "$OUTPUT_VIDEO" -progress pipe:1 2>/dev/null | show_progress 2
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "Error during second pass."
              exit 1
          fi
          echo "Pass 2 complete."

          # Verify output file exists and size
          if [ -f "$OUTPUT_VIDEO" ]; then
              OUTPUT_SIZE_BYTES=$(stat -c %s "$OUTPUT_VIDEO" 2>/dev/null || stat -f %z "$OUTPUT_VIDEO")
              OUTPUT_SIZE_MB=$(echo "$OUTPUT_SIZE_BYTES / 1048576" | bc -l | printf "%.2f")
              echo "Output file size: $OUTPUT_SIZE_MB MB"
              if (( $(echo "$OUTPUT_SIZE_MB > $TARGET_SIZE_MB * 1.1" | bc -l) )); then
                  echo "Warning: Output size exceeds target by more than 10%."
              elif (( $(echo "$OUTPUT_SIZE_MB < $TARGET_SIZE_MB * 0.9" | bc -l) )); then
                  echo "Note: Output size is more than 10% below target."
              fi
          else
              echo "Error: Output file was not created."
              exit 1
          fi

          aws s3 cp "$OUTPUT_VIDEO" "$S3_OUTPUT"
          rm -f "$INPUT_FILE" "$OUTPUT_VIDEO" ffmpeg2pass-0.log*
          EOF
          if [ $? -ne 0 ]; then
            echo "Error: Failed to create compress_video.sh at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          chmod +x /home/ec2-user/compress_video.sh >> "$LOG_FILE" 2>&1
          chown ec2-user:ec2-user /home/ec2-user/compress_video.sh >> "$LOG_FILE" 2>&1
          if [ -f /home/ec2-user/compress_video.sh ]; then
            echo "Compression script created successfully at $(date)" >> "$LOG_FILE"
          else
            echo "Error: compress_video.sh not found after creation attempt at $(date)" >> "$LOG_FILE"
            /usr/local/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}
            exit 1
          fi
          echo "Setup complete at $(date)" >> "$LOG_FILE"
          echo "UserData execution completed successfully at $(date)" >> "$LOG_FILE"
          
          # Signal success to CloudFormation
          /usr/local/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource VideoProcessingInstance --region ${AWS::Region}

  SSHKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: video_compression_key
      Tags:
        - Key: HEPE
          Value: Tools

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: HEPE
          Value: Tools

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${VideoBucket}/*"
      Tags:
        - Key: HEPE
          Value: Tools

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

Outputs:
  EC2PublicIP:
    Description: Public IP of the EC2 instance
    Value: !GetAtt VideoProcessingInstance.PublicIp
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref VideoBucket
  SSHKeyName:
    Description: Name of the SSH key pair
    Value: !Ref SSHKeyPair
  SSHKeyInstruction:
    Description: How to retrieve the private key
    Value: !Sub
      - "Run: aws ec2 describe-key-pairs --key-names ${KeyName} --include-public-key --profile your-profile"
      - KeyName: !Ref SSHKeyPair
  ScriptRunInstruction:
    Description: Command to run the script on EC2
    Value: !Sub
      - "ssh -i ~/.ssh/${KeyName}.pem ec2-user@${PublicIp} '/home/ec2-user/compress_video.sh <target_size_mb> <s3_input> <s3_output>'"
      - KeyName: !Ref SSHKeyPair
        PublicIp: !GetAtt VideoProcessingInstance.PublicIp