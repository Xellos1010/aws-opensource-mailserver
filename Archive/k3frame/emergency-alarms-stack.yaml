AWSTemplateFormatVersion: '2010-09-09'
Description: Emergency alarms for k3frame.com mailserver - Manages CloudWatch alarms that trigger automatic instance restart

Parameters:
  InstanceId:
    Type: String
    Description: EC2 instance ID to monitor (get from mailserver stack RestorePrefix or InstanceId output)
  StopStartLambdaArn:
    Type: String
    Description: ARN of the stop-start Lambda function (get from stop-start-helper stack LambdaFunctionArn output)
  ServiceRestartLambdaArn:
    Type: String
    Description: ARN of the service restart Lambda function (get from service-restart stack LambdaFunctionArn output)
  SystemResetLambdaArn:
    Type: String
    Description: ARN of the system reset Lambda function (get from system-reset stack LambdaFunctionArn output)
  MailHealthCheckLambdaArn:
    Type: String
    Description: ARN of the mail health check Lambda function (get from mail-health-check stack LambdaFunctionArn output)
  AlertTopicArn:
    Type: String
    Default: ''
    Description: Optional SNS topic ARN for alarm notifications (leave empty to skip SNS notifications)
  Region:
    Type: String
    Default: us-east-1
    Description: AWS region where resources are deployed

Resources:
  # Composite Lambda that orchestrates: health check -> service restart -> instance restart
  MailRecoveryOrchestratorLambda:
    Type: AWS::Lambda::Function
    Properties:
      Description: Orchestrates mail service recovery - checks health, restarts services, then instance if needed
      FunctionName: !Sub mail-recovery-orchestrator-${AWS::StackName}
      Handler: index.handler
      MemorySize: 512
      Role: !GetAtt MailRecoveryOrchestratorLambdaRole.Arn
      Runtime: python3.11
      Timeout: 300
      Environment:
        Variables:
          MAIL_HEALTH_CHECK_LAMBDA_ARN: !Ref MailHealthCheckLambdaArn
          SYSTEM_RESET_LAMBDA_ARN: !Ref SystemResetLambdaArn
          SERVICE_RESTART_LAMBDA_ARN: !Ref ServiceRestartLambdaArn
          STOP_START_LAMBDA_ARN: !Ref StopStartLambdaArn
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          
          lambda_client = boto3.client('lambda')
          
          def invoke_lambda(function_name, payload=None):
              """Invoke a Lambda function and return the result"""
              try:
                  response = lambda_client.invoke(
                      FunctionName=function_name,
                      InvocationType='RequestResponse',
                      Payload=json.dumps(payload) if payload else '{}'
                  )
                  result = json.loads(response['Payload'].read())
                  return result
              except Exception as e:
                  print(f"Error invoking {function_name}: {str(e)}")
                  return {'error': str(e), 'success': False}
          
          def handler(event, context):
              """
              Orchestrates mail service recovery:
              1. Check mail service health
              2. If unhealthy, try system reset (comprehensive - handles memory, processes, disk)
              3. If system reset fails, try service restart (simple)
              4. If service restart fails, trigger instance restart (last resort)
              """
              
              health_check_lambda = os.environ.get('MAIL_HEALTH_CHECK_LAMBDA_ARN')
              system_reset_lambda = os.environ.get('SYSTEM_RESET_LAMBDA_ARN')
              service_restart_lambda = os.environ.get('SERVICE_RESTART_LAMBDA_ARN')
              stop_start_lambda = os.environ.get('STOP_START_LAMBDA_ARN')
              
              alarm_name = event.get('AlarmName', 'Unknown')
              print(f"=== Mail Recovery Orchestrator ===")
              print(f"Triggered by alarm: {alarm_name}")
              
              # Step 1: Check mail service health
              print("Step 1: Checking mail service health...")
              health_result = invoke_lambda(health_check_lambda)
              
              # Parse health check result
              health_body = health_result.get('body', '{}')
              if isinstance(health_body, str):
                  health_data = json.loads(health_body)
              else:
                  health_data = health_body
              
              is_healthy = health_data.get('healthy', False)
              health_reason = health_data.get('health_reason', 'Unknown')
              
              print(f"Health check result: {'HEALTHY' if is_healthy else 'UNHEALTHY'}")
              print(f"Reason: {health_reason}")
              
              if is_healthy:
                  print("✅ Mail services are healthy - no action needed")
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Mail services are healthy - no recovery needed',
                          'alarm': alarm_name,
                          'health_check': health_data,
                          'action_taken': 'none'
                      })
                  }
              
              # Step 2: Try system reset (comprehensive - handles memory, processes, disk, services)
              if system_reset_lambda:
                  print("Step 2: Attempting system reset (comprehensive recovery)...")
                  system_reset_result = invoke_lambda(system_reset_lambda)
                  
                  # Parse system reset result
                  reset_body = system_reset_result.get('body', '{}')
                  if isinstance(reset_body, str):
                      reset_data = json.loads(reset_body)
                  else:
                      reset_data = reset_body
                  
                  reset_success = reset_data.get('success', False) and reset_data.get('services_healthy', False)
                  
                  if reset_success:
                      print("✅ System reset succeeded - comprehensive recovery completed")
                      return {
                          'statusCode': 200,
                          'body': json.dumps({
                              'message': 'System reset succeeded - comprehensive recovery without reboot',
                              'alarm': alarm_name,
                              'health_check': health_data,
                              'system_reset': reset_data,
                              'action_taken': 'system_reset'
                          })
                      }
                  else:
                      print("⚠️ System reset failed or incomplete, trying service restart...")
              
              # Step 3: Try service restart (simple fallback)
              print("Step 3: Attempting service restart (simple recovery)...")
              service_restart_result = invoke_lambda(service_restart_lambda)
              
              # Parse service restart result
              restart_body = service_restart_result.get('body', '{}')
              if isinstance(restart_body, str):
                  restart_data = json.loads(restart_body)
              else:
                  restart_data = restart_body
              
              restart_success = restart_data.get('success', False) and restart_data.get('services_healthy', False)
              
              if restart_success:
                  print("✅ Service restart succeeded - simple recovery completed")
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Service restart succeeded - simple recovery without reboot',
                          'alarm': alarm_name,
                          'health_check': health_data,
                          'system_reset': reset_data if system_reset_lambda else None,
                          'service_restart': restart_data,
                          'action_taken': 'service_restart'
                      })
                  }
              
              # Step 4: Fall back to instance restart (last resort)
              print("Step 4: All recovery methods failed, triggering instance restart (last resort)...")
              instance_restart_result = invoke_lambda(stop_start_lambda, {
                  'source': 'aws.cloudwatch',
                  'AlarmName': alarm_name
              })
              
              print("✅ Instance restart triggered")
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Instance restart triggered after all recovery methods failed',
                      'alarm': alarm_name,
                      'health_check': health_data,
                      'system_reset': reset_data if system_reset_lambda else None,
                      'service_restart': restart_data,
                      'instance_restart': instance_restart_result,
                      'action_taken': 'instance_restart'
                  })
              }
          
  MailRecoveryOrchestratorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub MailRecovery-${AWS::StackName}
      Description: Role for mail recovery orchestrator Lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MailRecoveryOrchestratorLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Ref MailHealthCheckLambdaArn
                  - !Ref SystemResetLambdaArn
                  - !Ref ServiceRestartLambdaArn
                  - !Ref StopStartLambdaArn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

  # Note: Lambda permissions for CloudWatch alarms are automatically created
  # by AWS when alarms are configured with Lambda actions. No explicit
  # permission resource is needed.

  # CloudWatch Log Group for syslog (required for OOM detection)
  SyslogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ec2/syslog-hepefoundation-org-mailserver'
      RetentionInDays: 7

  # OOM Metric Filter - detects "Out of memory" messages in syslog
  # This creates a CloudWatch metric that increments when OOM kills occur
  OOMMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: SyslogGroup
    Properties:
      LogGroupName: !Ref SyslogGroup
      FilterPattern: "Out of memory"
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: "EC2"
          MetricName: "oom_kills"

  # Instance Status Check Alarm
  InstanceStatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'InstanceStatusCheck-${InstanceId}'
      AlarmDescription: 'Alerts when EC2 instance status check fails (instance-level issues). Triggers automatic restart via stop-start Lambda.'
      MetricName: StatusCheckFailed_Instance
      Namespace: AWS/EC2
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !GetAtt MailRecoveryOrchestratorLambda.Arn
        - !If [HasAlertTopic, !Ref AlertTopicArn, !Ref AWS::NoValue]
      TreatMissingData: breaching
      Dimensions:
        - Name: InstanceId
          Value: !Ref InstanceId

  # System Status Check Alarm
  SystemStatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SystemStatusCheck-${InstanceId}'
      AlarmDescription: 'Alerts when EC2 system status check fails (AWS infrastructure issues). Triggers automatic restart via stop-start Lambda.'
      MetricName: StatusCheckFailed_System
      Namespace: AWS/EC2
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !GetAtt MailRecoveryOrchestratorLambda.Arn
        - !If [HasAlertTopic, !Ref AlertTopicArn, !Ref AWS::NoValue]
      TreatMissingData: breaching
      Dimensions:
        - Name: InstanceId
          Value: !Ref InstanceId

  # OOM Kill Alarm
  OOMKillAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'OOMKillDetected-${InstanceId}'
      AlarmDescription: 'Alerts when Out-of-Memory killer terminates processes. Triggers automatic restart via stop-start Lambda.'
      MetricName: oom_kills
      Namespace: EC2
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !GetAtt MailRecoveryOrchestratorLambda.Arn
        - !If [HasAlertTopic, !Ref AlertTopicArn, !Ref AWS::NoValue]
      TreatMissingData: notBreaching

Conditions:
  HasAlertTopic: !Not [!Equals [!Ref AlertTopicArn, '']]

Outputs:
  InstanceStatusCheckAlarmName:
    Description: Name of the Instance Status Check alarm
    Value: !Ref InstanceStatusCheckAlarm
    Export:
      Name: !Sub '${AWS::StackName}-InstanceStatusCheckAlarm'

  SystemStatusCheckAlarmName:
    Description: Name of the System Status Check alarm
    Value: !Ref SystemStatusCheckAlarm
    Export:
      Name: !Sub '${AWS::StackName}-SystemStatusCheckAlarm'

  OOMKillAlarmName:
    Description: Name of the OOM Kill alarm
    Value: !Ref OOMKillAlarm
    Export:
      Name: !Sub '${AWS::StackName}-OOMKillAlarm'

  StopStartLambdaArn:
    Description: ARN of the Lambda function that will be triggered
    Value: !Ref StopStartLambdaArn

  MailRecoveryOrchestratorLambdaArn:
    Description: ARN of the mail recovery orchestrator Lambda function
    Value: !GetAtt MailRecoveryOrchestratorLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MailRecoveryOrchestratorLambdaArn'
