AWSTemplateFormatVersion: '2010-09-09'
Description: Service restart Lambda for hepefoundation.org - Restarts mail services (postfix/dovecot/nginx) without restarting EC2 instance

Parameters:
  InstanceId:
    Type: String
    Description: EC2 instance ID to manage services on (get from mailserver stack RestorePrefix or InstanceId output)
  Region:
    Type: String
    Default: us-east-1
    Description: AWS region where resources are deployed

Resources:
  ServiceRestartLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ServiceRestartLambda-${AWS::StackName}
      Description: Role for service restart Lambda
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ServiceRestartLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:DescribeInstanceInformation
                  - ec2:DescribeInstances
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'

  ServiceRestartLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Restarts mail services (postfix/dovecot/nginx) via SSM without restarting EC2 instance
      FunctionName: !Sub service-restart-${AWS::StackName}
      Handler: index.handler
      MemorySize: 256
      Role: !GetAtt ServiceRestartLambdaRole.Arn
      Runtime: python3.11
      Timeout: 60
      Environment:
        Variables:
          INSTANCE_ID: !Ref InstanceId
      Code:
        ZipFile: |
          import boto3
          import json
          import time
          import os
          
          ssm = boto3.client('ssm')
          ec2 = boto3.client('ec2')
          
          def restart_mail_services(instance_id):
              """
              Restart mail services (postfix, dovecot, nginx) without restarting the instance.
              Uses Mail-in-a-Box daemon if available, otherwise restarts individual services.
              """
              
              restart_script = """
              set -e
              
              echo "=== Mail Service Restart ==="
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              
              # Try Mail-in-a-Box daemon first (preferred method)
              if [ -x /opt/mailinabox/management/mailinabox-daemon ]; then
                  echo "Using Mail-in-a-Box daemon..."
                  sudo /opt/mailinabox/management/mailinabox-daemon restart || {
                      echo "MIAB daemon restart failed, falling back to individual services..."
                      sudo systemctl restart postfix || true
                      sudo systemctl restart dovecot || true
                      sudo systemctl restart nginx || true
                  }
              elif [ -x /usr/local/bin/mailinabox ]; then
                  echo "Using /usr/local/bin/mailinabox..."
                  sudo /usr/local/bin/mailinabox restart || {
                      echo "mailinabox restart failed, falling back to individual services..."
                      sudo systemctl restart postfix || true
                      sudo systemctl restart dovecot || true
                      sudo systemctl restart nginx || true
                  }
              else
                  echo "MIAB daemon not found, restarting individual services..."
                  sudo systemctl restart postfix || true
                  sudo systemctl restart dovecot || true
                  sudo systemctl restart nginx || true
              fi
              
              # Wait a moment for services to start
              sleep 2
              
              # Verify service status
              echo ""
              echo "=== Service Status ==="
              echo "Postfix: $(systemctl is-active postfix || echo 'unknown')"
              echo "Dovecot: $(systemctl is-active dovecot || echo 'unknown')"
              echo "Nginx: $(systemctl is-active nginx || echo 'unknown')"
              
              # Check if services are active
              POSTFIX_ACTIVE=$(systemctl is-active postfix 2>/dev/null || echo "inactive")
              DOVECOT_ACTIVE=$(systemctl is-active dovecot 2>/dev/null || echo "inactive")
              NGINX_ACTIVE=$(systemctl is-active nginx 2>/dev/null || echo "inactive")
              
              if [ "$POSTFIX_ACTIVE" = "active" ] && [ "$DOVECOT_ACTIVE" = "active" ]; then
                  echo ""
                  echo "✅ Mail services restarted successfully"
                  exit 0
              else
                  echo ""
                  echo "⚠️ Some services may not be active:"
                  [ "$POSTFIX_ACTIVE" != "active" ] && echo "  - Postfix: $POSTFIX_ACTIVE"
                  [ "$DOVECOT_ACTIVE" != "active" ] && echo "  - Dovecot: $DOVECOT_ACTIVE"
                  [ "$NGINX_ACTIVE" != "active" ] && echo "  - Nginx: $NGINX_ACTIVE"
                  exit 1
              fi
              """
              
              try:
                  print(f"Restarting mail services on instance {instance_id}")
                  
                  # Send SSM command
                  response = ssm.send_command(
                      InstanceIds=[instance_id],
                      DocumentName="AWS-RunShellScript",
                      Parameters={'commands': [restart_script]},
                      TimeoutSeconds=60
                  )
                  
                  # Extract CommandId from nested response structure
                  if 'Command' in response and 'CommandId' in response['Command']:
                      command_id = response['Command']['CommandId']
                  elif 'CommandId' in response:
                      command_id = response['CommandId']
                  else:
                      return {
                          'success': False,
                          'status': 'Error',
                          'error': f'No CommandId in response: {response}'
                      }
                  
                  # Wait for command completion (poll up to 50 seconds)
                  max_wait = 50
                  waited = 0
                  while waited < max_wait:
                      time.sleep(2)
                      waited += 2
                      output = ssm.get_command_invocation(
                          CommandId=command_id,
                          InstanceId=instance_id
                      )
                      status = output.get('Status')
                      
                      if status in ['Success', 'Failed', 'TimedOut', 'Cancelled']:
                          stdout = output.get('StandardOutputContent', '')
                          stderr = output.get('StandardErrorContent', '')
                          
                          result = {
                              'success': status == 'Success',
                              'status': status,
                              'stdout': stdout,
                              'stderr': stderr,
                              'command_id': command_id
                          }
                          
                          # Check if services are actually active from output
                          if status == 'Success':
                              if '✅ Mail services restarted successfully' in stdout:
                                  result['services_healthy'] = True
                              else:
                                  result['services_healthy'] = False
                          else:
                              result['services_healthy'] = False
                          
                          return result
                  
                  # Timeout
                  return {
                      'success': False,
                      'status': 'Timeout',
                      'error': f'Command timed out after {max_wait} seconds',
                      'command_id': command_id
                  }
                  
              except Exception as e:
                  print(f"Error restarting services: {str(e)}")
                  return {
                      'success': False,
                      'status': 'Error',
                      'error': str(e)
                  }
          
          def handler(event, context):
              instance_id = os.environ.get('INSTANCE_ID')
              
              if not instance_id:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'error': 'INSTANCE_ID environment variable not set',
                          'success': False
                      })
                  }
              
              try:
                  print(f"Restarting mail services for instance {instance_id}")
                  result = restart_mail_services(instance_id)
                  
                  status_code = 200 if result.get('success') and result.get('services_healthy') else 500
                  
                  return {
                      'statusCode': status_code,
                      'body': json.dumps(result, indent=2)
                  }
              except Exception as e:
                  print(f"Error in service restart: {str(e)}")
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'error': str(e),
                          'success': False
                      })
                  }

Outputs:
  LambdaFunctionArn:
    Description: ARN of the service restart Lambda function
    Value: !GetAtt ServiceRestartLambdaFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunctionArn'

  LambdaFunctionName:
    Description: Name of the service restart Lambda function
    Value: !Ref ServiceRestartLambdaFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunctionName'

