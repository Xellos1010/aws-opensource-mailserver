name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build & test everything affected
      - run: pnpm nx format:check

      - run: pnpm nx affected -t lint -t build -t test --parallel=3

